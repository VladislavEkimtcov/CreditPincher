# GitHub Actions Workflow created for handling the release process automatically on every build.
name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and Release Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Build the local plugin distribution zip package
      - name: Build Plugin
        run: ./gradlew buildPlugin

      # Create a new GitHub Release and upload the built zip artifact
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.${{ github.run_number }} ./build/distributions/* \
            --title "Release v1.0.${{ github.run_number }}" \
            --notes "${{ github.event.head_commit.message || 'Automated release.' }}"